<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="artifact-type" content="deck" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Lora:wght@400;500&display=swap" />
  <style>
    :root { --bg: #faf9f5; --text: #141413; --muted: #73706a; --accent: #d97757; --accent-2: #6a9bcc; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 720px; overflow: hidden; }
    body { font-family: Lora, Georgia, "PingFang SC", serif; background: var(--bg); color: var(--text); }
    .slide {
      width: 1280px; height: 720px; padding: 72px 96px;
      display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;
    }
    .slide::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
    }
    [data-role="hero-eyebrow"] {
      font-family: "Space Grotesk", sans-serif; font-size: 12pt; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px;
    }
    [data-role="hero-title"] {
      font-family: "Space Grotesk", sans-serif; font-size: 40pt; font-weight: 600;
      line-height: 1.12; max-width: 17ch;
    }
    [data-role="hero-subtitle"] {
      font-size: 17pt; color: var(--muted); margin-top: 28px; max-width: 44ch; line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div data-role="hero-eyebrow">PPTWork · Agent Skills</div>
    <h1 data-role="hero-title">Portable agent skills turn any host into a deck pipeline</h1>
    <p data-role="hero-subtitle">Two composable skills for Cursor, Claude Code, OpenCode, or Codex — HTML in, PowerPoint out.</p>
  </div>
  <script type="application/json" id="ppt-speaker-notes-json">
  { "text": "Open with the headline. Emphasize portability — no custom MCP required, just Node scripts and SKILL.md files." }
  </script>
</body>
</html>
