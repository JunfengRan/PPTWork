<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="artifact-type" content="deck" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" />
  <style>
    :root { --bg: #ffffff; --text: #1a2035; --muted: #6b7280; --accent: #1d4ed8; --card-bg: #f1f5f9; --border: rgba(0,0,0,0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 720px; overflow: hidden; }
    body { font-family: "Source Sans 3", sans-serif; background: var(--bg); color: var(--text); }
    .slide { width: 1280px; height: 720px; padding: 56px 64px 48px; display: flex; flex-direction: column; overflow: hidden; }
    [data-role="page-title"] { font-family: Inter, sans-serif; font-size: 28pt; font-weight: 700; margin-bottom: 32px; flex-shrink: 0; }
    .grid { flex: 1 1 0; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    [data-role="agenda-item"] { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 28px; }
    [data-role="agenda-number"] { font-family: Inter, sans-serif; font-size: 32pt; font-weight: 700; color: var(--accent); }
    [data-role="agenda-title"] { font-family: Inter, sans-serif; font-size: 18pt; font-weight: 600; margin-top: 8px; }
    [data-role="agenda-desc"] { font-size: 13pt; color: var(--muted); margin-top: 8px; line-height: 1.5; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 data-role="page-title">Quick start in four commands</h2>
    <div class="grid">
      <div data-role="agenda-item">
        <div data-role="agenda-number">01</div>
        <div data-role="agenda-title">Init deck</div>
        <div data-role="agenda-desc">deck.mjs init mydeck --mode raster</div>
      </div>
      <div data-role="agenda-item">
        <div data-role="agenda-number">02</div>
        <div data-role="agenda-title">Add slide</div>
        <div data-role="agenda-desc">deck.mjs init-slide mydeck cover</div>
      </div>
      <div data-role="agenda-item">
        <div data-role="agenda-number">03</div>
        <div data-role="agenda-title">Screenshot QC</div>
        <div data-role="agenda-desc">screenshot.mjs mydeck cover</div>
      </div>
      <div data-role="agenda-item">
        <div data-role="agenda-number">04</div>
        <div data-role="agenda-title">Export PPTX</div>
        <div data-role="agenda-desc">export.mjs mydeck --mode raster</div>
      </div>
    </div>
  </div>
  <script type="application/json" id="ppt-speaker-notes-json">
  { "text": "Each card is one CLI step. Offer to demo live if presenting to developers." }
  </script>
</body>
</html>
