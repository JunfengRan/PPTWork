<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="artifact-type" content="deck" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #ffffff; --text: #1a2035; --muted: #6b7280; --accent: #1d4ed8; --card-bg: #f1f5f9; --border: rgba(0,0,0,0.08); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 720px; overflow: hidden; }
    body { font-family: "Source Sans 3", sans-serif; background: var(--bg); color: var(--text); }
    .slide { width: 1280px; height: 720px; padding: 48px 64px; display: flex; flex-direction: column; overflow: hidden; }
    [data-role="page-title"] { font-family: Inter, sans-serif; font-size: 24pt; font-weight: 700; margin-bottom: 24px; flex-shrink: 0; }
    .cols { flex: 1 1 0; min-height: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .eyebrow { color: var(--accent); font-size: 11pt; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
    [data-role="body"] { list-style: none; display: flex; flex-direction: column; gap: 14px; }
    [data-role="body"] li { font-size: 14pt; line-height: 1.5; padding-left: 20px; position: relative; }
    [data-role="body"] li::before { content: ""; position: absolute; left: 0; top: 10px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    [data-role="body"] strong { font-family: Inter, sans-serif; }
    .chart-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 20px; height: 100%; display: flex; flex-direction: column; }
    .chart-panel h3 { font-family: Inter, sans-serif; font-size: 14pt; margin-bottom: 12px; }
    .chart-wrap { flex: 1 1 0; min-height: 0; position: relative; }
  </style>
</head>
<body>
  <div class="slide">
    <h2 data-role="page-title">Deck orchestration and single-page authoring compose cleanly</h2>
    <div class="cols">
      <div>
        <div class="eyebrow">Two-skill split</div>
        <ul data-role="body">
          <li><strong>ppt skill</strong> — clarify, plan, init deck, visual QC, export</li>
          <li><strong>ppt-html-authoring</strong> — design.md + slide.html per page</li>
          <li>Node scripts replace MCP: deck, screenshot, export</li>
        </ul>
      </div>
      <div class="chart-panel">
        <h3>Responsibility coverage</h3>
        <div class="chart-wrap"><canvas data-ppt-chart-canvas id="c"></canvas></div>
      </div>
    </div>
  </div>
  <script>
    new Chart(document.getElementById("c"), {
      type: "bar",
      data: {
        labels: ["Planning", "Authoring", "QC", "Export"],
        datasets: [
          { label: "ppt", data: [95, 20, 90, 100], backgroundColor: "#1d4ed8" },
          { label: "authoring", data: [10, 100, 30, 5], backgroundColor: "#93c5fd" }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: "bottom" } }, scales: { y: { max: 100, ticks: { callback: v => v + "%" } } } }
    });
  </script>
  <script type="application/json" id="ppt-speaker-notes-json">
  { "text": "Left column is the narrative split. Right chart shows relative scope — orchestration touches every page, authoring is per-slide." }
  </script>
</body>
</html>
