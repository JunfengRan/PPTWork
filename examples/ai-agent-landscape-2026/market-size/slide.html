<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="artifact-type" content="deck" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" />
  <style>
    :root { --bg: #ffffff; --bg-2: #f8f9fc; --text: #1a2035; --muted: #6b7280; --accent: #1d4ed8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 720px; overflow: hidden; }
    body { font-family: "Source Sans 3", sans-serif; background: radial-gradient(125% 125% at 100% 0%, var(--bg-2), var(--bg)); color: var(--text); }
    .slide { width: 1280px; height: 720px; padding: 56px 80px; display: flex; flex-direction: column; justify-content: center; }
    [data-role="page-title"] { font-family: Inter, sans-serif; font-size: 24pt; font-weight: 700; margin-bottom: 40px; }
    .stats { display: flex; gap: 48px; }
    [data-role="stat-value"] { font-family: Inter, sans-serif; font-size: 52pt; font-weight: 700; color: var(--accent); line-height: 1; font-variant-numeric: tabular-nums; }
    [data-role="stat-label"] { font-size: 16pt; color: var(--muted); margin-top: 12px; line-height: 1.4; }
    .source { margin-top: 48px; font-size: 10pt; color: var(--muted); }
  </style>
</head>
<body>
  <div class="slide">
    <h2 data-role="page-title">TAM reaches USD 47B in 2026 with 42% CAGR</h2>
    <div class="stats">
      <div><div data-role="stat-value">$47B</div><div data-role="stat-label">Total addressable market · 2026</div></div>
      <div><div data-role="stat-value">42%</div><div data-role="stat-label">Compound annual growth · 2024–2028</div></div>
      <div><div data-role="stat-value">3.2×</div><div data-role="stat-label">Enterprise vs consumer spend by 2028</div></div>
    </div>
    <div class="source">Source: illustrative estimates for sample deck · verify before external use</div>
  </div>
  <script type="application/json" id="ppt-speaker-notes-json">
  { "text": "Three market KPIs. Numbers are illustrative — run research phase for production decks." }
  </script>
</body>
</html>
