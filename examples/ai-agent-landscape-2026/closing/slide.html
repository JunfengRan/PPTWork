<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="artifact-type" content="deck" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" />
  <style>
    :root { --bg: #fff; --bg-2: #f8f9fc; --text: #1a2035; --muted: #6b7280; --accent: #1d4ed8; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1280px; height: 720px; overflow: hidden; }
    body { font-family: "Source Sans 3", sans-serif; background: linear-gradient(135deg, var(--bg) 60%, var(--bg-2)); color: var(--text); }
    .slide { width: 1280px; height: 720px; padding: 64px 80px; display: flex; flex-direction: column; justify-content: center; }
    [data-role="cta-title"] { font-family: Inter, sans-serif; font-size: 36pt; font-weight: 700; line-height: 1.15; max-width: 16ch; margin-bottom: 28px; }
    [data-role="cta-body"] { list-style: none; margin-bottom: 36px; }
    [data-role="cta-body"] li { font-size: 16pt; color: var(--muted); margin-bottom: 10px; padding-left: 20px; position: relative; }
    [data-role="cta-body"] li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }
    [data-role="cta-action"] { display: inline-flex; padding: 14px 32px; border-radius: 999px; background: var(--accent); color: #fff; font-family: Inter, sans-serif; font-size: 16pt; font-weight: 600; width: fit-content; }
  </style>
</head>
<body>
  <div class="slide">
    <h1 data-role="cta-title">Capture the orchestration layer before Q4</h1>
    <ul data-role="cta-body">
      <li>Seed round to ship orchestration MVP by Q2</li>
      <li>Design-partner pipeline across 3 verticals</li>
      <li>90-day eval benchmark vs incumbent copilots</li>
    </ul>
    <div data-role="cta-action">Schedule deep dive →</div>
  </div>
  <script type="application/json" id="ppt-speaker-notes-json">
  { "text": "Investment close. Three asks, then pause on CTA." }
  </script>
</body>
</html>
